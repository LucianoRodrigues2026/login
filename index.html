<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/mobilefrist.css">
  <link rel="stylesheet" href="style/outrastelas.css">

 <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

  <title>login</title>
</head>
<body>
  <main>
    <section id="login">
      <div id="imagen">

      </div>
      <div id="formulario">
        <h1>Login</h1>
        <p>Seja munto bem-vindo(a) novamente. Faça login para acessar sua conta e fazer novas coinfigurações no seu ambiente. </p>
        <form action="login/login.js" method="post" autocomplete="on">

          <div class="loginformat">
            <span class="material-symbols-outlined">account_box</span>
            <input type="email" name="nomeUsuario" id="usuario" placeholder="E-mail" maxlength="30" required>
            <label for="usuario">Usuario</label>
          </div>


          <div class="loginformat">
            <span class="material-symbols-outlined">vpn_key</span>
            <input type="password" name="passSenha" id="senha" required minlength="8" maxlength="20" placeholder="Senha" autocomplete="current-password">
            <label for="senha">Senha</label>
          </div>

          <input id="confirmar" type="submit" value="login">

          <div id="esqueci" ><a href="#">Esqueci a senha <span class="material-symbols-outlined">outbox_alt</span></a></div>

        </form>
      </div>
    </section>
  </main>
</body>
</html>
